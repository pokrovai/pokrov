server:
  host: 0.0.0.0
  port: 8080

logging:
  level: info
  format: json
  component: runtime

shutdown:
  drain_timeout_ms: 5000
  grace_period_ms: 10000

security:
  fail_on_unresolved_api_keys: false
  api_keys:
    - key: env:POKROV_API_KEY
      profile: strict

sanitization:
  enabled: true
  default_profile: strict
  profiles:
    minimal:
      mode_default: enforce
      categories:
        secrets: mask
        pii: allow
        corporate_markers: allow
      mask_visible_suffix: 4
    strict:
      mode_default: enforce
      categories:
        secrets: block
        pii: redact
        corporate_markers: mask
      mask_visible_suffix: 4
    custom:
      mode_default: dry_run
      categories:
        secrets: redact
        pii: mask
        corporate_markers: mask
      mask_visible_suffix: 4
      custom_rules:
        - id: custom.project_andromeda
          category: corporate_markers
          pattern: "(?i)project\\s+andromeda"
          action: redact
          priority: 900
          enabled: true

llm:
  providers:
    - id: openai
      base_url: https://api.openai.com/v1
      auth:
        api_key: env:OPENAI_API_KEY
      timeout_ms: 30000
      retry_budget: 1
      enabled: true
  routes:
    - model: gpt-4o-mini
      provider_id: openai
      output_sanitization: true
      enabled: true
  defaults:
    profile_id: strict
    output_sanitization: true
