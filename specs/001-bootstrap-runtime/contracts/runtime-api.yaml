openapi: 3.1.0
info:
  title: Pokrov Bootstrap Runtime API
  version: 0.1.0
  description: Bootstrap runtime contracts for liveness and readiness probes.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Process liveness probe
      operationId: getHealth
      responses:
        '200':
          description: Process is alive
          headers:
            X-Request-Id:
              description: Correlation identifier for the request
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /ready:
    get:
      summary: Runtime readiness probe
      operationId: getReady
      responses:
        '200':
          description: Service is ready to receive traffic
          headers:
            X-Request-Id:
              description: Correlation identifier for the request
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Service is still starting or is draining
          headers:
            X-Request-Id:
              description: Correlation identifier for the request
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
components:
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - request_id
      properties:
        status:
          type: string
          enum:
            - ok
        request_id:
          type: string
    ReadyResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - request_id
        - checks
      properties:
        status:
          type: string
          enum:
            - ready
            - starting
            - draining
        request_id:
          type: string
        checks:
          $ref: '#/components/schemas/ReadyChecks'
    ReadyChecks:
      type: object
      additionalProperties: false
      required:
        - config
        - runtime
        - active_requests
      properties:
        config:
          type: string
          enum:
            - ok
            - pending
            - failed
        runtime:
          type: string
          enum:
            - ok
            - pending
            - draining
        active_requests:
          type: integer
          minimum: 0
