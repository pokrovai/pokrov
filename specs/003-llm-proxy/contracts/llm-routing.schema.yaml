$schema: "https://json-schema.org/draft/2020-12/schema"
title: Pokrov LLM Routing Configuration
version: 1.0.0
type: object
additionalProperties: false
required:
  - llm
properties:
  llm:
    type: object
    additionalProperties: false
    required:
      - providers
      - routes
      - defaults
    properties:
      providers:
        type: array
        minItems: 1
        maxItems: 16
        items:
          $ref: '#/$defs/Provider'
      routes:
        type: array
        minItems: 1
        maxItems: 256
        items:
          $ref: '#/$defs/Route'
      defaults:
        $ref: '#/$defs/Defaults'

$defs:
  SecretRef:
    type: string
    minLength: 1
    pattern: '^(env|file):.+'

  Provider:
    type: object
    additionalProperties: false
    required:
      - id
      - base_url
      - auth
      - enabled
    properties:
      id:
        type: string
        minLength: 2
        maxLength: 64
        pattern: '^[a-zA-Z0-9_\-]+$'
      base_url:
        type: string
        format: uri
      auth:
        type: object
        additionalProperties: false
        required:
          - api_key
        properties:
          api_key:
            $ref: '#/$defs/SecretRef'
      timeout_ms:
        type: integer
        minimum: 100
        maximum: 120000
        default: 30000
      retry_budget:
        type: integer
        minimum: 0
        maximum: 3
        default: 0
      enabled:
        type: boolean

  Route:
    type: object
    additionalProperties: false
    required:
      - model
      - provider_id
    properties:
      model:
        type: string
        minLength: 1
        maxLength: 128
      provider_id:
        type: string
        minLength: 2
        maxLength: 64
      output_sanitization:
        type: boolean
      enabled:
        type: boolean
        default: true

  Defaults:
    type: object
    additionalProperties: false
    required:
      - profile_id
      - output_sanitization
    properties:
      profile_id:
        type: string
        enum:
          - minimal
          - strict
          - custom
      output_sanitization:
        type: boolean
      stream_sanitization_max_buffer_bytes:
        type: integer
        minimum: 1024
        maximum: 16777216
        default: 1048576

x-validation-rules:
  - provider ids must be unique
  - each model must map to at most one enabled route
  - route provider_id must reference an existing enabled provider
  - "secrets must be referenced via env: or file: only"
  - raw API keys in config are forbidden
