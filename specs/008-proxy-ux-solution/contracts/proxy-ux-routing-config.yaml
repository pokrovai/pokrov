version: 2
name: pokrov-proxy-ux-routing-config-contract
description: >-
  Configuration and validation contract for Proxy UX roadmap P0+P1+P2:
  discovery, aliases/wildcards, fallback chains, provider transforms,
  responses passthrough, and provider/model rate limits.

llm:
  providers:
    type: array
    minItems: 1
    item_contract:
      required: [id, base_url, auth, enabled, transform_profile]
      fields:
        id:
          type: string
          minLength: 1
          uniqueness: global
        base_url:
          type: string
          format: uri
        upstream_path:
          type: string
          required: false
          default_behavior: use_legacy_default_path
          constraints: [must_start_with_slash]
        transform_profile:
          type: enum
          values: [openai_compatible, anthropic, gemini]
        auth:
          type: object
          required: true
        enabled:
          type: boolean

  routes:
    type: array
    minItems: 1
    item_contract:
      required: [model, provider_id, enabled]
      fields:
        model:
          type: string
          minLength: 1
        provider_id:
          type: string
          must_reference: llm.providers.id
        aliases:
          type: array
          required: false
          item_type: string
          normalization: lower_case
          constraints:
            - alias_keys_must_be_globally_unique_across_enabled_routes
        wildcard_prefixes:
          type: array
          required: false
          item_type: string
          normalization: lower_case
          constraints:
            - wildcard_prefix_must_not_be_empty
            - wildcard_resolution_must_be_deterministic
        fallback_chain_id:
          type: string
          required: false
          must_reference: llm.fallback_chains.id
        output_sanitization:
          type: boolean
          required: false
          default: true
        enabled:
          type: boolean

  fallback_chains:
    type: array
    required: false
    item_contract:
      required: [id, steps, trigger_policy]
      fields:
        id:
          type: string
          minLength: 1
          uniqueness: global
        trigger_policy:
          type: enum
          values: [transport_or_5xx, timeout_only]
        steps:
          type: array
          minItems: 1
          item_contract:
            required: [route_model, max_attempts]
            fields:
              route_model:
                type: string
              max_attempts:
                type: integer
                minimum: 1

responses:
  passthrough:
    enabled:
      type: boolean
      default: true
    allow_subset_fallback:
      type: boolean
      default: false

rate_limit:
  provider_model_profiles:
    type: array
    required: false
    item_contract:
      required:
        - provider_id
        - model_key
        - request_budget_per_window
        - token_budget_per_window
        - window_ms
        - enforcement_mode
      fields:
        provider_id:
          type: string
          must_reference: llm.providers.id
        model_key:
          type: string
          minLength: 1
          normalization: lower_case
        request_budget_per_window:
          type: integer
          minimum: 1
        token_budget_per_window:
          type: integer
          minimum: 1
        window_ms:
          type: integer
          minimum: 1000
        enforcement_mode:
          type: enum
          values: [enforce, dry_run]

response_envelope:
  pokrov_metadata:
    mode:
      type: enum
      values: [enabled, suppressed]
      default: enabled
      behavior:
        enabled:
          include_in_success: true
          include_in_error: true
        suppressed:
          include_in_success: false
          include_in_error: false

validation:
  startup:
    fail_when:
      - duplicate_provider_id
      - route_references_unknown_provider
      - alias_conflict_after_normalization
      - wildcard_conflict_or_ambiguity
      - invalid_fallback_chain_reference
      - fallback_chain_cycle_detected
      - invalid_upstream_path_format
      - duplicate_provider_model_rate_limit_profile
    readiness_state_on_failure: not_ready
    error_code_on_failure: runtime_not_ready

observability:
  logging:
    required_fields:
      - request_id
      - route
      - input_model_key
      - normalized_model_key
      - resolved_model
      - provider_id
      - resolution_status
      - resolution_source
      - fallback_step
      - transform_profile
    forbidden_fields:
      - raw_prompt
      - raw_model_output
      - credentials
  metrics:
    required_counters:
      - pokrov_model_resolution_total
      - pokrov_model_resolution_failed_total
      - pokrov_models_catalog_requests_total
      - pokrov_fallback_activations_total
      - pokrov_transform_failures_total
      - pokrov_provider_model_rate_limit_events_total

out_of_scope: []
